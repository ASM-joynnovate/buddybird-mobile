version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - "area: ci"
      - "dependencies"
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Expo SDK 메이저 마이그레이션은 수동
      - dependency-name: "expo"
      - dependency-name: "expo-*"
        update-types: ["version-update:semver-major"]
      # React 코어는 SDK와 함께 핀
      - dependency-name: "react"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
        update-types: ["version-update:semver-major"]
    groups:
      npm-patches:
        update-types:
          - patch
      types-and-dev:
        dependency-type: development
        update-types:
          - minor
          - patch
