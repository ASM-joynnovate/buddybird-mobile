name: EAS Build (production)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: eas-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint + typecheck)
    uses: ./.github/workflows/_verify.yml

  notify-start:
    name: Notify Slack (Start)
    needs: verify
    uses: ./.github/workflows/_notify-slack.yml
    with:
      status: started
      env: production
      message: ${{ github.ref_name }}
    secrets: inherit

  build-production:
    name: Build (Production)
    needs: [verify, notify-start]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: yarn
      - run: yarn install --immutable
      - name: Write Firebase config for local config introspect (prod)
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_PROD_BASE64 }}
          JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_PROD_BASE64 }}
        run: |
          mkdir -p config/prod/firebase
          echo "$PLIST_B64" | base64 --decode > config/prod/firebase/GoogleService-Info.plist
          echo "$JSON_B64" | base64 --decode > config/prod/firebase/google-services.json
      - name: EAS Build (production, Android + iOS)
        run: eas build --profile production --platform all --non-interactive --wait --message "${{ github.ref_name }}"
      # submit 없음 — 운영 출시는 수동 게이트 (Android: Play promote / iOS: 로컬 eas submit + App Store 심사)

  github-release:
    name: GitHub Release
    needs: [build-production]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release from tag (auto-generated notes)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --generate-notes

  notify-result:
    name: Notify Slack (Result)
    needs: [build-production, github-release]
    if: ${{ always() }}
    uses: ./.github/workflows/_notify-slack.yml
    with:
      status: ${{ (contains(needs.*.result, 'failure') && 'failure') || (contains(needs.*.result, 'cancelled') && 'cancelled') || 'success' }}
      env: production
      message: ${{ github.ref_name }}
    secrets: inherit
