name: EAS Build & Submit (staging)
on:
  push:
    branches: [staging]
concurrency:
  group: eas-staging
  cancel-in-progress: false
jobs:
  build_and_submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: yarn
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
      - name: EAS Build (staging, Android)
        run: eas build --profile staging --platform android --non-interactive --wait
      - name: EAS Submit (Play internal track)
        run: eas submit --profile staging --platform android --non-interactive --latest
