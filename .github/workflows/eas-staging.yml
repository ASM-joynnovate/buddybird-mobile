name: EAS Build & Submit (staging)
on:
  push:
    branches: [staging]

concurrency:
  group: eas-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint + typecheck)
    uses: ./.github/workflows/_verify.yml

  build-and-submit:
    name: Build and Submit (Staging)
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: yarn
      - run: yarn install --immutable
      - name: EAS Build (staging, Android)
        run: eas build --profile staging --platform android --non-interactive --wait
      - name: Write Play service account
        env:
          SA_B64: ${{ secrets.PLAY_SERVICE_ACCOUNT_BASE64 }}
        run: echo "$SA_B64" | base64 --decode > /tmp/play-service-account.json
      - name: EAS Submit (Play internal track)
        run: eas submit --profile staging --platform android --non-interactive --latest
