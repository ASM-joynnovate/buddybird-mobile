name: EAS Build & Submit (staging)
on:
  workflow_dispatch:
  # 매 main 머지마다 자동 빌드하려면 주석 해제 (native 빌드 소음·EAS 분 증가)
  # push:
  #   branches: [main]

concurrency:
  group: eas-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint + typecheck)
    uses: ./.github/workflows/_verify.yml

  notify-start:
    name: Notify Slack (Start)
    needs: verify
    uses: ./.github/workflows/_notify-slack.yml
    with:
      status: started
      env: staging
    secrets: inherit

  build-and-submit:
    name: Build and Submit (Staging)
    needs: [verify, notify-start]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: yarn
      - run: yarn install --immutable
      - name: Write Firebase config for local config introspect (dev)
        env:
          PLIST_B64: ${{ secrets.GOOGLE_SERVICES_INFO_PLIST_DEV_BASE64 }}
          JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_DEV_BASE64 }}
        run: |
          mkdir -p config/dev/firebase
          echo "$PLIST_B64" | base64 --decode > config/dev/firebase/GoogleService-Info.plist
          echo "$JSON_B64" | base64 --decode > config/dev/firebase/google-services.json
      - name: EAS Build (staging, all)
        run: eas build --profile staging --platform all --non-interactive --wait
      - name: Write Play service account
        env:
          SA_B64: ${{ secrets.PLAY_SERVICE_ACCOUNT_BASE64 }}
        run: echo "$SA_B64" | base64 --decode > /tmp/play-service-account.json
      - name: EAS Submit (Play internal track)
        run: eas submit --profile staging --platform android --non-interactive --latest
      - name: Write ASC API key
        env:
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
        run: echo "$ASC_KEY_B64" | base64 --decode > /tmp/asc-api-key.p8
      - name: EAS Submit (TestFlight internal)
        run: eas submit --profile staging --platform ios --non-interactive --latest

  notify-result:
    name: Notify Slack (Result)
    needs: build-and-submit
    if: ${{ always() && needs.build-and-submit.result != 'skipped' }}
    uses: ./.github/workflows/_notify-slack.yml
    with:
      status: ${{ needs.build-and-submit.result }}
      env: staging
    secrets: inherit
