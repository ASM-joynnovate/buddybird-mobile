name: Verify (reusable)
on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn typecheck
