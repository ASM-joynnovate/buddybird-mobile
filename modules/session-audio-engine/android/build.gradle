plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.joynnovate.buddybird'
version = '0.1.0'

android {
  namespace 'com.joynnovate.buddybird.sessionaudio'
  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  // Keep this aligned with the Media3 version used by the installed expo-audio module.
  implementation 'androidx.core:core:1.13.1'
  implementation 'androidx.media3:media3-exoplayer:1.8.0'
}
